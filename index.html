<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Cats – Cat Database</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0720;--surface:#1a0f35;--card:#231545;--border:rgba(255,214,0,0.15);--yellow:#FFD600;--orange:#FF6B00;--purple:#9B59F5;--text:#f0e8ff;--muted:rgba(240,232,255,0.55)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow:hidden}
body.ready{overflow:auto}

/* ═══════════════ PRELOADER ═══════════════ */
#preloader{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 40%, #2d0a5c 0%, #0f0720 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity 0.6s ease, transform 0.6s ease;
}
#preloader.hide{opacity:0;pointer-events:none;transform:scale(1.04)}

/* Bouncing cats row */
.cats-row{display:flex;gap:16px;margin-bottom:32px;align-items:flex-end;height:80px}
.cat-bounce{
  font-size:42px;
  animation:catBounce 0.7s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 12px rgba(255,214,0,0.5));
}
.cat-bounce:nth-child(1){animation-delay:0s}
.cat-bounce:nth-child(2){animation-delay:0.15s}
.cat-bounce:nth-child(3){animation-delay:0.3s}
.cat-bounce:nth-child(4){animation-delay:0.45s}
.cat-bounce:nth-child(5){animation-delay:0.6s}
@keyframes catBounce{
  from{transform:translateY(0) rotate(-5deg) scale(1)}
  to{transform:translateY(-28px) rotate(5deg) scale(1.1)}
}

.pre-title{
  font-family:'Bangers',cursive;
  font-size:46px;letter-spacing:4px;
  color:var(--yellow);
  text-shadow:3px 3px 0 var(--orange),6px 6px 0 rgba(0,0,0,0.5);
  margin-bottom:6px;
}
.pre-sub{
  font-size:13px;font-weight:700;
  color:var(--muted);margin-bottom:28px;
}

/* Progress bar */
.pre-bar-wrap{
  width:320px;background:rgba(255,255,255,0.08);
  border-radius:20px;height:10px;overflow:hidden;
  border:1px solid rgba(255,214,0,0.2);
  margin-bottom:12px;
}
.pre-bar-fill{
  height:100%;width:0%;border-radius:20px;
  background:linear-gradient(90deg,#FF6B00,#FFD600,#FF6B00);
  background-size:200% 100%;
  animation:shimmer 1.5s linear infinite;
  transition:width 0.25s ease;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.pre-pct{
  font-family:'Bangers',cursive;font-size:28px;letter-spacing:2px;
  color:var(--yellow);margin-bottom:4px;
}
.pre-count{font-size:12px;font-weight:700;color:var(--muted)}

/* Pulse dots */
.dots{display:flex;gap:8px;margin-top:20px}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--yellow);opacity:0.3;
  animation:dotPulse 1.2s ease-in-out infinite;
}
.dot:nth-child(1){animation-delay:0s}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

/* ═══════════════ MAIN CONTENT ═══════════════ */
#main-content{opacity:0;transition:opacity 0.5s ease}
#main-content.show{opacity:1}

.header{
  background:linear-gradient(135deg,#1a0f35 0%,#3b0070 60%,#1a0f35 100%);
  border-bottom:2px solid rgba(255,214,0,0.25);
  padding:28px 32px 20px;text-align:center;
}
.header h1{
  font-family:'Bangers',cursive;font-size:52px;letter-spacing:3px;
  color:var(--yellow);text-shadow:3px 3px 0 var(--orange),6px 6px 0 rgba(0,0,0,0.5);
  line-height:1;margin-bottom:4px;
}
.header p{color:var(--muted);font-size:13px;font-weight:700}

.controls{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  padding:16px 32px;background:var(--surface);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;
}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.controls input[type="text"]{
  width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  padding:10px 14px 10px 40px;outline:none;transition:border-color 0.2s;
}
.controls input[type="text"]:focus{border-color:var(--yellow)}
.controls input::placeholder{color:var(--muted)}
.tier-btns{display:flex;gap:6px;flex-wrap:wrap}
.tier-btn{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;
  padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.1);
  cursor:pointer;transition:all 0.15s;background:var(--card);color:var(--muted);
}
.tier-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.tier-btn.active{color:#1a0f35;border-color:transparent}
.tier-btn[data-t=""].active{background:var(--yellow)}
.tier-btn[data-t="N"].active{background:#b4b2a9}
.tier-btn[data-t="EX"].active{background:#85B7EB}
.tier-btn[data-t="RR"].active{background:#97C459}
.tier-btn[data-t="SR"].active{background:#EF9F27}
.tier-btn[data-t="UR"].active{background:#F0997B}
.tier-btn[data-t="LR"].active{background:#AFA9EC}
.count-label{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;margin-left:auto}
.count-label span{color:var(--yellow)}

.table-wrap{padding:20px 32px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{
  text-align:left;padding:10px 16px;color:var(--muted);
  font-weight:900;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  border-bottom:1px solid var(--border);background:var(--surface);
}
tbody tr{border-bottom:1px solid rgba(255,214,0,0.06);transition:background 0.1s;cursor:default}
tbody tr:hover{background:rgba(155,89,245,0.12)}
td{padding:9px 16px}
.id-cell{color:var(--muted);font-variant-numeric:tabular-nums;font-weight:700;width:58px;font-size:13px}
.name-cell{font-weight:700}
.tier-badge{display:inline-block;font-size:10px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:0.5px}
.t-N{background:#b4b2a9;color:#2c2c2a}
.t-EX{background:#85B7EB;color:#042C53}
.t-RR{background:#97C459;color:#173404}
.t-SR{background:#EF9F27;color:#412402}
.t-UR{background:#F0997B;color:#4A1B0C}
.t-LR{background:#AFA9EC;color:#26215C}
.wiki-link{color:var(--purple);text-decoration:none;font-size:12px;font-weight:700;opacity:0.8;transition:opacity 0.15s}
.wiki-link:hover{opacity:1;text-decoration:underline}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-size:16px;font-weight:700}
.no-results span{font-size:40px;display:block;margin-bottom:12px}

/* ── TOOLTIP ── */
#tooltip{
  position:fixed;pointer-events:none;z-index:9999;
  background:linear-gradient(145deg,#1a0f35 0%,#3b0070 100%);
  border:2px solid rgba(255,214,0,0.45);border-radius:16px;padding:16px 14px 12px;
  width:190px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.75);display:none;
}
#tooltip .tip-img-area{width:140px;height:140px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
#tooltip img{max-width:140px;max-height:140px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 0 10px rgba(255,214,0,0.45))}
#tooltip .tip-loading{color:var(--muted);font-size:12px;font-weight:700}
#tooltip .tip-name{font-family:'Bangers',cursive;font-size:16px;color:var(--yellow);letter-spacing:1px;line-height:1.2;margin-bottom:4px}
#tooltip .tip-row{display:flex;justify-content:center;gap:8px;align-items:center}
#tooltip .tip-id{font-size:11px;color:var(--muted);font-weight:700}

.footer{text-align:center;padding:22px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:20px}
.footer a{color:var(--purple);text-decoration:none}

/* Remaining-load mini bar (after preloader closes, for 90→100%) */
#mini-bar{
  position:fixed;top:0;left:0;right:0;height:3px;z-index:8000;
  background:transparent;pointer-events:none;
  transition:opacity 0.4s;
}
#mini-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#FF6B00,#FFD600);
  transition:width 0.3s ease;
}
</style>
</head>

"https://static.miraheze.org/battlecatswiki/5/53/855_1.png",
"https://static.miraheze.org/battlecatswiki/9/94/856_1.png",
"https://static.miraheze.org/battlecatswiki/5/5e/857_1.png",
"https://static.miraheze.org/battlecatswiki/b/bc/858_1.png",
"https://static.miraheze.org/battlecatswiki/3/38/859_1.png",
"https://static.miraheze.org/battlecatswiki/4/49/860_1.png"
];

function imgUrl(id){ return IMG_URLS[id]||''; }

function wikiPage(name){
  const MAP={
    "Cat":"Cat_(Normal_Cat)","Tank Cat":"Tank_Cat_(Normal_Cat)",
    "Axe Cat":"Axe_Cat_(Normal_Cat)","Gross Cat":"Gross_Cat_(Normal_Cat)",
    "Cow Cat":"Cow_Cat_(Normal_Cat)","Bird Cat":"Bird_Cat_(Normal_Cat)",
    "Fish Cat":"Fish_Cat_(Normal_Cat)","Lizard Cat":"Lizard_Cat_(Normal_Cat)",
    "Titan Cat":"Titan_Cat_(Normal_Cat)"
  };
  const page=MAP[name]||name.replace(/ /g,'_');
  return 'https://battlecats.miraheze.org/wiki/'+encodeURIComponent(page);
}

const imgCache={};
let activeTier='';

/* ═══════════ PRELOADER LOGIC ═══════════ */
const TOTAL_CATS = DATA.length;          // 861
const PHASE1_TARGET = Math.floor(TOTAL_CATS * 0.90); // 90% = ~775
const BATCH = 20;
const BATCH_MS = 80;

const preFill  = document.getElementById('pre-fill');
const prePct   = document.getElementById('pre-pct');
const preCount = document.getElementById('pre-count');
const preloader= document.getElementById('preloader');
const mainContent = document.getElementById('main-content');
const miniBarFill = document.getElementById('mini-bar-fill');

preCount.textContent = '0 / '+PHASE1_TARGET+' ตัว';

let loadedCount = 0;
let preloaderDone = false;

function onImageSettled(id, src){
  imgCache[id] = src;
  loadedCount++;

  // update preloader bar (0 → 90%)
  if(!preloaderDone){
    const pct = Math.min(Math.round((loadedCount/PHASE1_TARGET)*100), 100);
    preFill.style.width = pct+'%';
    prePct.textContent = pct+'%';
    preCount.textContent = loadedCount+' / '+PHASE1_TARGET+' ตัว';

    if(loadedCount >= PHASE1_TARGET){
      preloaderDone = true;
      dismissPreloader();
    }
  } else {
    // after preloader → update mini top bar (90% → 100%)
    const remaining = TOTAL_CATS - PHASE1_TARGET;
    const doneAfter = loadedCount - PHASE1_TARGET;
    const pct90 = 90 + Math.round((doneAfter/remaining)*10);
    miniBarFill.style.width = Math.min(pct90,100)+'%';
    if(loadedCount >= TOTAL_CATS){
      setTimeout(()=>{ document.getElementById('mini-bar').style.opacity='0'; },800);
    }
  }
}

function dismissPreloader(){
  preFill.style.width='100%';
  prePct.textContent='100%';
  preCount.textContent=PHASE1_TARGET+' / '+PHASE1_TARGET+' ตัว';
  setTimeout(()=>{
    preloader.classList.add('hide');
    mainContent.classList.add('show');
    document.body.classList.add('ready');
    // mini bar starts at 90%
    miniBarFill.style.width='90%';
    // render table now
    filter();
    // continue loading remaining 10%
    loadRange(PHASE1_TARGET, TOTAL_CATS-1);
  }, 350);
  setTimeout(()=>{ preloader.style.display='none'; }, 1000);
}

function loadBatch(ids){
  ids.forEach(idx=>{
    const id = DATA[idx][0];
    if(imgCache[id]){ onImageSettled(id, imgCache[id]); return; }
    const img = new Image();
    img.onload = ()=>onImageSettled(id, img.src);
    img.onerror=()=>onImageSettled(id, 'error');
    img.src = imgUrl(id);
  });
}

function loadRange(start, end){
  let i = start;
  function step(){
    if(i>end) return;
    const batch=[];
    for(let j=0;j<BATCH&&i<=end;j++,i++) batch.push(i);
    loadBatch(batch);
    setTimeout(step, BATCH_MS);
  }
  step();
}

// Start loading phase 1 immediately (indices 0 → PHASE1_TARGET-1)
loadRange(0, PHASE1_TARGET-1);

/* ═══════════ TABLE ═══════════ */
function setTier(btn){
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTier=btn.dataset.t;
  filter();
}

function filter(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const tbody=document.getElementById('tbody');
  const noRes=document.getElementById('no-results');
  const filtered=DATA.filter(r=>{
    const tok=!activeTier||r[1]===activeTier;
    const nok=r[2].toLowerCase().includes(q)||String(r[0]).includes(q);
    return tok&&nok;
  });
  document.getElementById('shown').textContent=filtered.length;
  if(!filtered.length){ tbody.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';
  tbody.innerHTML=filtered.map(([id,tier,name])=>
    `<tr onmouseenter="showTip(event,${id},'${name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}','${tier}')"
         onmouseleave="hideTip()" onmousemove="moveTip(event)">
      <td class="id-cell">${id}</td>
      <td><span class="tier-badge t-${tier}">${tier}</span></td>
      <td class="name-cell">${name}</td>
      <td><a class="wiki-link" href="${wikiPage(name)}" target="_blank" onclick="event.stopPropagation()">Wiki ↗</a></td>
    </tr>`
  ).join('');
}

/* ═══════════ TOOLTIP ═══════════ */
const tip=document.getElementById('tooltip');
const tipImgArea=document.getElementById('tip-img-area');
const tipName=document.getElementById('tip-name');
const tipBadge=document.getElementById('tip-tier-badge');
const tipId=document.getElementById('tip-id');
const TIER_CLS={N:'t-N',EX:'t-EX',RR:'t-RR',SR:'t-SR',UR:'t-UR',LR:'t-LR'};

function showTip(e,id,name,tier){
  tipName.textContent=name;
  tipBadge.textContent=tier;
  tipBadge.className='tier-badge '+(TIER_CLS[tier]||'');
  tipId.textContent='# '+id;
  const cached=imgCache[id];
  if(cached==='error'){
    tipImgArea.innerHTML='<div class="tip-loading">🐾 ไม่มีรูป</div>';
  } else if(cached){
    tipImgArea.innerHTML=`<img src="${cached}" alt="${name}">`;
  } else {
    tipImgArea.innerHTML='<div class="tip-loading">กำลังโหลด...</div>';
    const img=new Image();
    img.onload=()=>{ imgCache[id]=img.src; if(tip.style.display!=='none') tipImgArea.innerHTML=`<img src="${img.src}" alt="${name}">`; };
    img.onerror=()=>{ imgCache[id]='error'; if(tip.style.display!=='none') tipImgArea.innerHTML='<div class="tip-loading">🐾 ไม่มีรูป</div>'; };
    img.src=imgUrl(id);
  }
  tip.style.display='block';
  moveTip(e);
}

function moveTip(e){
  const pad=18;
  let x=e.clientX+pad, y=e.clientY+pad;
  const tw=190,th=230;
  if(x+tw>window.innerWidth-pad) x=e.clientX-tw-pad;
  if(y+th>window.innerHeight-pad) y=e.clientY-th-pad;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

function hideTip(){ tip.style.display='none'; }

document.getElementById('total').textContent=TOTAL_CATS;
</script>
